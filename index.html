<body class="bg-stone-950">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// ---------- Icon helper: resolve a kebab-case icon name to PascalCase and render it directly via lucide.createElement (no global DOM scanning, so no race conditions between simultaneously-mounting icons) ----------
function toPascalCase(kebab) {
  return kebab
    .split("-")
    .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
    .join("");
}
function Icon({ name, size = 18, strokeWidth = 2, className = "" }) {
  const ref = React.useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    const iconNode = window.lucide.icons[toPascalCase(name)];
    if (!iconNode) return;
    const svg = window.lucide.createElement(iconNode);
    svg.setAttribute("width", size);
    svg.setAttribute("height", size);
    svg.setAttribute("stroke-width", strokeWidth);
    if (className) svg.setAttribute("class", (svg.getAttribute("class") || "") + " " + className);
    ref.current.innerHTML = "";
    ref.current.appendChild(svg);
  }, [name, size, strokeWidth, className]);
  return <span ref={ref} style={{ display: "inline-flex", lineHeight: 0 }} />;
}

// ---------- Storage (device-local, persists across launches) ----------
const LS_PREFIX = "counter_pos_";
function storeGet(key, fallback) {
  try {
    const raw = localStorage.getItem(LS_PREFIX + key);
    return raw != null ? JSON.parse(raw) : fallback;
  } catch {
    return fallback;
  }
}
function storeSet(key, value) {
  try {
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
  } catch (e) {
    console.error("storage set failed", e);
  }
}

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const CURRENCY = "₱";
const money = (n) =>
  CURRENCY + (Number(n) || 0).toLocaleString("en-PH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const todayKey = (d = new Date()) => d.toISOString().slice(0, 10);
const fmtQty = (n, unit) =>
  unit === "kg" ? (Math.round((Number(n) || 0) * 100) / 100).toString() : String(Math.round(Number(n) || 0));
const unitLabel = (unit) => (unit === "kg" ? "kg" : "pc");

// ---------------- ROOT APP ----------------
function App() {
  const [tab, setTab] = useState("sell"); // sell | inventory | reports
  const [products, setProducts] = useState(() => storeGet("products", []));
  const [sales, setSales] = useState(() => storeGet("sales", []));
  const [toast, setToast] = useState(null);
  const [cart, setCart] = useState({}); // productId -> qty

  useEffect(() => { storeSet("products", products); }, [products]);
  useEffect(() => { storeSet("sales", sales); }, [sales]);

  function flash(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  }

  function addProduct(p) {
    setProducts((prev) => [...prev, { id: uid(), ...p }]);
    flash(`Added "${p.name}"`);
  }
  function updateProduct(id, patch) {
    setProducts((prev) => prev.map((p) => (p.id === id ? { ...p, ...patch } : p)));
  }
  function deleteProduct(id) {
    setProducts((prev) => prev.filter((p) => p.id !== id));
    setCart((prev) => {
      const n = { ...prev };
      delete n[id];
      return n;
    });
  }

  function addToCart(id, step) {
    const p = products.find((x) => x.id === id);
    if (!p) return;
    const inc = step != null ? step : p.unit === "kg" ? 0.25 : 1;
    setCart((prev) => {
      const current = prev[id] || 0;
      const next = Math.round((current + inc) * 1000) / 1000;
      if (next > p.stock) {
        flash(`Only ${fmtQty(p.stock, p.unit)} ${unitLabel(p.unit)} left of "${p.name}"`);
        return prev;
      }
      return { ...prev, [id]: next };
    });
  }
  function setCartQty(id, qty) {
    const p = products.find((x) => x.id === id);
    if (!p) return;
    let q = Math.max(0, Math.min(qty, p.stock));
    q = p.unit === "kg" ? Math.round(q * 1000) / 1000 : Math.round(q);
    setCart((prev) => {
      const n = { ...prev, [id]: q };
      if (q <= 0) delete n[id];
      return n;
    });
  }

  const cartItems = useMemo(
    () =>
      Object.entries(cart)
        .map(([id, qty]) => {
          const p = products.find((x) => x.id === id);
          if (!p) return null;
          return { productId: id, name: p.name, qty, price: p.price, cost: p.cost || 0, unit: p.unit || "pc" };
        })
        .filter(Boolean),
    [cart, products]
  );
  const cartTotal = cartItems.reduce((sum, i) => sum + i.qty * i.price, 0);

  function completeSale() {
    if (cartItems.length === 0) return;
    const sale = { id: uid(), ts: Date.now(), items: cartItems, total: cartTotal };
    setSales((prev) => [...prev, sale]);
    setProducts((prev) =>
      prev.map((p) => {
        const item = cartItems.find((i) => i.productId === p.id);
        return item ? { ...p, stock: Math.max(0, p.stock - item.qty) } : p;
      })
    );
    setCart({});
    flash(`Sale recorded — ${money(cartTotal)}`);
  }

  return (
    <div className="min-h-screen bg-stone-950 text-stone-100 flex flex-col">
      <Header />
      <main className="flex-1 overflow-y-auto pb-24">
        {tab === "sell" && (
          <SellTab
            products={products}
            cart={cart}
            cartItems={cartItems}
            cartTotal={cartTotal}
            onAdd={addToCart}
            onSetQty={setCartQty}
            onComplete={completeSale}
          />
        )}
        {tab === "inventory" && (
          <InventoryTab products={products} onAdd={addProduct} onUpdate={updateProduct} onDelete={deleteProduct} />
        )}
        {tab === "reports" && <ReportsTab sales={sales} products={products} />}
      </main>
      <TabBar tab={tab} setTab={setTab} cartCount={Object.values(cart).reduce((a, b) => a + b, 0)} />
      {toast && (
        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-amber-400 text-stone-950 text-sm font-semibold px-4 py-2 rounded-full shadow-lg z-50 whitespace-nowrap">
          {toast}
        </div>
      )}
    </div>
  );
}

function Header() {
  return (
    <header className="safe-top sticky top-0 z-30 bg-stone-950/95 backdrop-blur border-b border-stone-800 px-4 py-3 flex items-center gap-2">
      <div className="w-8 h-8 rounded-md bg-amber-400 flex items-center justify-center text-stone-950 font-black text-sm">
        ₱
      </div>
      <h1 className="text-lg font-bold tracking-tight">Counter</h1>
    </header>
  );
}

function TabBar({ tab, setTab, cartCount }) {
  const items = [
    { id: "sell", label: "Sell", icon: "receipt", badge: cartCount },
    { id: "inventory", label: "Inventory", icon: "package", badge: 0 },
    { id: "reports", label: "Reports", icon: "bar-chart-3", badge: 0 },
  ];
  return (
    <nav className="safe-bottom fixed bottom-0 left-0 right-0 z-30 bg-stone-900 border-t border-stone-800 flex">
      {items.map(({ id, label, icon, badge }) => (
        <button
          key={id}
          onClick={() => setTab(id)}
          className={`flex-1 flex flex-col items-center justify-center gap-0.5 py-2.5 relative transition-colors ${
            tab === id ? "text-amber-400" : "text-stone-500"
          }`}
        >
          <Icon name={icon} size={20} strokeWidth={tab === id ? 2.5 : 2} />
          <span className="text-[11px] font-medium">{label}</span>
          {badge > 0 && (
            <span className="absolute top-1 right-1/2 translate-x-3 bg-amber-400 text-stone-950 text-[10px] font-bold w-4 h-4 rounded-full flex items-center justify-center">
              {badge}
            </span>
          )}
        </button>
      ))}
    </nav>
  );
}

// ---------------- SELL TAB ----------------
function SellTab({ products, cart, cartItems, cartTotal, onAdd, onSetQty, onComplete }) {
  const [query, setQuery] = useState("");
  const [showReceipt, setShowReceipt] = useState(false);

  const filtered = products.filter((p) => p.name.toLowerCase().includes(query.toLowerCase()));
  const itemCount = cartItems.reduce((a, i) => a + i.qty, 0);

  return (
    <div className="px-4 pt-3">
      <div className="relative mb-3">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500">
          <Icon name="search" size={16} />
        </span>
        <input
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Search products…"
          className="w-full bg-stone-900 border border-stone-800 rounded-xl pl-9 pr-3 py-2.5 text-sm placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-amber-400/60"
        />
      </div>

      {products.length === 0 ? (
        <EmptyState icon="package" title="No products yet" body="Add products in the Inventory tab before you start selling." />
      ) : filtered.length === 0 ? (
        <EmptyState icon="search" title="No matches" body={`Nothing found for "${query}".`} />
      ) : (
        <div className={`space-y-2 ${itemCount > 0 ? "pb-24" : "pb-2"}`}>
          {filtered.map((p) => {
            const unit = p.unit || "pc";
            const isKg = unit === "kg";
            const qty = cart[p.id] || 0;
            const out = p.stock <= 0;
            const selected = qty > 0;
            return (
              <div
                key={p.id}
                className={`rounded-xl border p-3 transition-colors ${
                  out
                    ? "bg-stone-900/50 border-stone-800 opacity-50"
                    : selected
                    ? "bg-amber-400/10 border-amber-400/60"
                    : "bg-stone-900 border-stone-800"
                }`}
              >
                <div className="flex items-center gap-3">
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm leading-tight mb-0.5 truncate">{p.name}</div>
                    <div className="text-amber-400 font-bold text-sm">
                      {money(p.price)}
                      {isKg && <span className="text-stone-500 font-normal">/kg</span>}
                    </div>
                    <div className={`text-[11px] mt-0.5 ${out ? "text-red-400" : "text-stone-500"}`}>
                      {out ? "Out of stock" : `${fmtQty(p.stock, unit)} ${unitLabel(unit)} left`}
                    </div>
                  </div>

                  {!out && !isKg && (
                    qty === 0 ? (
                      <button
                        onClick={() => onAdd(p.id)}
                        className="bg-amber-400 text-stone-950 font-bold text-sm rounded-lg px-3.5 py-2 active:scale-95 transition-transform shrink-0"
                      >
                        Add
                      </button>
                    ) : (
                      <div className="flex items-center gap-2 shrink-0">
                        <button
                          onClick={() => onSetQty(p.id, qty - 1)}
                          className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center active:bg-stone-700"
                        >
                          <Icon name="minus" size={15} />
                        </button>
                        <span className="w-6 text-center text-sm font-bold">{fmtQty(qty, unit)}</span>
                        <button
                          onClick={() => onSetQty(p.id, qty + 1)}
                          disabled={qty >= p.stock}
                          className="w-8 h-8 rounded-full bg-stone-800 flex items-center justify-center active:bg-stone-700 disabled:opacity-40"
                        >
                          <Icon name="plus" size={15} />
                        </button>
                      </div>
                    )
                  )}

                  {!out && isKg && qty === 0 && (
                    <button
                      onClick={() => onAdd(p.id, 0.25)}
                      className="bg-amber-400 text-stone-950 font-bold text-sm rounded-lg px-3.5 py-2 active:scale-95 transition-transform shrink-0"
                    >
                      Add
                    </button>
                  )}
                </div>

                {!out && isKg && qty > 0 && (
                  <div className="mt-2.5 pt-2.5 border-t border-stone-800/70">
                    <div className="flex items-center gap-2 mb-2">
                      <input
                        type="number"
                        inputMode="decimal"
                        step="0.05"
                        min="0"
                        value={qty}
                        onChange={(e) => onSetQty(p.id, parseFloat(e.target.value) || 0)}
                        className="w-20 bg-stone-950 border border-stone-700 rounded-lg px-2.5 py-1.5 text-sm font-bold text-center focus:outline-none focus:ring-2 focus:ring-amber-400/60"
                      />
                      <span className="text-xs text-stone-500">kg ·</span>
                      <span className="text-sm font-bold text-amber-400">{money(qty * p.price)}</span>
                      <button
                        onClick={() => onSetQty(p.id, 0)}
                        className="ml-auto text-stone-500 p-1.5 rounded-lg bg-stone-800 active:bg-stone-700"
                      >
                        <Icon name="x" size={14} />
                      </button>
                    </div>
                    <div className="flex gap-1.5">
                      {[0.25, 0.5, 1].map((step) => (
                        <button
                          key={step}
                          onClick={() => onAdd(p.id, step)}
                          disabled={qty >= p.stock}
                          className="flex-1 bg-stone-800 active:bg-stone-700 disabled:opacity-40 text-xs font-semibold rounded-lg py-1.5"
                        >
                          +{step} kg
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {itemCount > 0 && (
        <div className="safe-bottom fixed bottom-16 left-0 right-0 z-20 bg-stone-900 border-t border-amber-400/30 px-4 py-3 shadow-[0_-4px_16px_rgba(0,0,0,0.3)]">
          <div className="flex items-center justify-between mb-2.5">
            <span className="text-xs text-stone-400">{cartItems.length} product(s) selected</span>
            <span className="text-lg font-bold text-amber-400">{money(cartTotal)}</span>
          </div>
          <button
            onClick={() => setShowReceipt(true)}
            className="w-full bg-amber-400 text-stone-950 font-bold rounded-xl py-3 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
          >
            <Icon name="check" size={18} strokeWidth={3} /> Charge {money(cartTotal)}
          </button>
        </div>
      )}

      {showReceipt && (
        <CartSheet
          items={cartItems}
          total={cartTotal}
          onClose={() => setShowReceipt(false)}
          onSetQty={onSetQty}
          onComplete={() => {
            onComplete();
            setShowReceipt(false);
          }}
        />
      )}
    </div>
  );
}

function CartSheet({ items, total, onClose, onSetQty, onComplete }) {
  return (
    <div className="fixed inset-0 z-40 flex items-end">
      <div className="absolute inset-0 bg-black/60" onClick={onClose} />
      <div className="relative w-full bg-stone-950 rounded-t-2xl border-t border-stone-800 max-h-[80vh] flex flex-col">
        <div className="flex items-center justify-between px-4 py-3 border-b border-stone-800">
          <h2 className="font-bold">Confirm sale</h2>
          <button onClick={onClose} className="text-stone-500 p-1">
            <Icon name="x" size={20} />
          </button>
        </div>
        <div className="overflow-y-auto px-4 py-2 flex-1">
          {items.map((it) => (
            <div key={it.productId} className="flex items-center justify-between py-2.5 border-b border-stone-900">
              <div className="flex-1 min-w-0 pr-2">
                <div className="text-sm font-medium truncate">{it.name}</div>
                <div className="text-xs text-stone-500">
                  {money(it.price)} {it.unit === "kg" ? "/kg" : "each"}
                </div>
              </div>
              {it.unit === "kg" ? (
                <div className="flex items-center gap-1.5">
                  <input
                    type="number"
                    inputMode="decimal"
                    step="0.05"
                    min="0"
                    value={it.qty}
                    onChange={(e) => onSetQty(it.productId, parseFloat(e.target.value) || 0)}
                    className="w-16 bg-stone-900 border border-stone-700 rounded-lg px-2 py-1 text-sm font-semibold text-center focus:outline-none focus:ring-2 focus:ring-amber-400/60"
                  />
                  <span className="text-xs text-stone-500">kg</span>
                </div>
              ) : (
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => onSetQty(it.productId, it.qty - 1)}
                    className="w-7 h-7 rounded-full bg-stone-800 flex items-center justify-center active:bg-stone-700"
                  >
                    <Icon name="minus" size={14} />
                  </button>
                  <span className="w-5 text-center text-sm font-semibold">{it.qty}</span>
                  <button
                    onClick={() => onSetQty(it.productId, it.qty + 1)}
                    className="w-7 h-7 rounded-full bg-stone-800 flex items-center justify-center active:bg-stone-700"
                  >
                    <Icon name="plus" size={14} />
                  </button>
                </div>
              )}
              <div className="w-20 text-right text-sm font-bold ml-2">{money(it.qty * it.price)}</div>
            </div>
          ))}
        </div>
        <div className="safe-bottom px-4 py-3 border-t border-stone-800 bg-stone-900/50">
          <div className="flex items-center justify-between mb-3">
            <span className="text-stone-400 text-sm">Total</span>
            <span className="text-xl font-bold text-amber-400">{money(total)}</span>
          </div>
          <button
            onClick={onComplete}
            className="w-full bg-amber-400 text-stone-950 font-bold rounded-xl py-3 flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
          >
            <Icon name="check" size={18} strokeWidth={3} /> Complete sale
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------------- INVENTORY TAB ----------------
function InventoryTab({ products, onAdd, onUpdate, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);

  return (
    <div className="px-4 pt-3">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-sm font-semibold text-stone-400">{products.length} product(s)</h2>
        <button
          onClick={() => { setEditing(null); setShowForm(true); }}
          className="bg-amber-400 text-stone-950 text-sm font-bold rounded-lg px-3 py-1.5 flex items-center gap-1 active:scale-95 transition-transform"
        >
          <Icon name="plus" size={16} strokeWidth={3} /> Add
        </button>
      </div>

      {products.length === 0 ? (
        <EmptyState icon="package" title="No products yet" body='Tap "Add" to create your first product.' />
      ) : (
        <div className="space-y-2">
          {products.map((p) => (
            <div key={p.id} className="bg-stone-900 border border-stone-800 rounded-xl p-3 flex items-center justify-between">
              <div className="flex-1 min-w-0">
                <div className="font-semibold text-sm">{p.name}</div>
                <div className="text-xs text-stone-500 mt-0.5">
                  {money(p.price)}
                  {p.unit === "kg" ? "/kg" : ""} · {fmtQty(p.stock, p.unit)} {unitLabel(p.unit)} in stock
                  {p.cost ? ` · cost ${money(p.cost)}` : ""}
                </div>
              </div>
              <div className="flex items-center gap-1">
                <button
                  onClick={() => { setEditing(p); setShowForm(true); }}
                  className="text-stone-400 text-xs font-semibold px-2.5 py-1.5 rounded-lg bg-stone-800 active:bg-stone-700"
                >
                  Edit
                </button>
                <button
                  onClick={() => onDelete(p.id)}
                  className="text-red-400 p-1.5 rounded-lg bg-stone-800 active:bg-stone-700 ml-1"
                >
                  <Icon name="trash-2" size={14} />
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showForm && (
        <ProductForm
          initial={editing}
          onClose={() => setShowForm(false)}
          onSave={(data) => {
            if (editing) onUpdate(editing.id, data);
            else onAdd(data);
            setShowForm(false);
          }}
        />
      )}
    </div>
  );
}

function ProductForm({ initial, onClose, onSave }) {
  const [name, setName] = useState(initial?.name || "");
  const [unit, setUnit] = useState(initial?.unit || "pc");
  const [price, setPrice] = useState(initial?.price ?? "");
  const [cost, setCost] = useState(initial?.cost ?? "");
  const [stock, setStock] = useState(initial?.stock ?? "");
  const isKg = unit === "kg";
  const valid = name.trim() && price !== "" && stock !== "" && Number(price) >= 0 && Number(stock) >= 0;

  return (
    <div className="fixed inset-0 z-40 flex items-end">
      <div className="absolute inset-0 bg-black/60" onClick={onClose} />
      <div className="relative w-full bg-stone-950 rounded-t-2xl border-t border-stone-800 p-4 pb-6 safe-bottom">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold">{initial ? "Edit product" : "Add product"}</h2>
          <button onClick={onClose} className="text-stone-500 p-1">
            <Icon name="x" size={20} />
          </button>
        </div>
        <div className="space-y-3">
          <Field label="Product name">
            <input
              autoFocus
              value={name}
              onChange={(e) => setName(e.target.value)}
              placeholder='e.g., "Coke 1.5L"'
              className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60"
            />
          </Field>
          <Field label="Sold by">
            <div className="grid grid-cols-2 gap-2">
              {[
                { id: "pc", label: "Piece", hint: "count items" },
                { id: "kg", label: "Kilogram", hint: "weigh items" },
              ].map((opt) => (
                <button
                  key={opt.id}
                  type="button"
                  onClick={() => setUnit(opt.id)}
                  className={`rounded-lg border px-3 py-2 text-left transition-colors ${
                    unit === opt.id ? "bg-amber-400/10 border-amber-400/60" : "bg-stone-900 border-stone-800"
                  }`}
                >
                  <div className={`text-sm font-semibold ${unit === opt.id ? "text-amber-400" : "text-stone-200"}`}>
                    {opt.label}
                  </div>
                  <div className="text-[11px] text-stone-500">{opt.hint}</div>
                </button>
              ))}
            </div>
          </Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label={isKg ? "Price (₱/kg)" : "Price (₱)"}>
              <input
                type="number"
                inputMode="decimal"
                value={price}
                onChange={(e) => setPrice(e.target.value)}
                placeholder="0.00"
                className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60"
              />
            </Field>
            <Field label={isKg ? "Cost (₱/kg, optional)" : "Cost (₱, optional)"}>
              <input
                type="number"
                inputMode="decimal"
                value={cost}
                onChange={(e) => setCost(e.target.value)}
                placeholder="0.00"
                className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60"
              />
            </Field>
          </div>
          <Field label={isKg ? "Stock (kg)" : "Stock quantity"}>
            <input
              type="number"
              inputMode={isKg ? "decimal" : "numeric"}
              step={isKg ? "0.1" : "1"}
              value={stock}
              onChange={(e) => setStock(e.target.value)}
              placeholder={isKg ? "0.0" : "0"}
              className="w-full bg-stone-900 border border-stone-800 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400/60"
            />
          </Field>
        </div>
        <button
          disabled={!valid}
          onClick={() =>
            onSave({
              name: name.trim(),
              unit,
              price: Number(price),
              cost: cost === "" ? 0 : Number(cost),
              stock: Number(stock),
            })
          }
          className="w-full mt-5 bg-amber-400 disabled:bg-stone-800 disabled:text-stone-600 text-stone-950 font-bold rounded-xl py-3 transition-colors"
        >
          {initial ? "Save changes" : "Add product"}
        </button>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <span className="block text-xs text-stone-500 mb-1 font-medium">{label}</span>
      {children}
    </label>
  );
}

// ---------------- REPORTS TAB ----------------
function ReportsTab({ sales, products }) {
  const [range, setRange] = useState("today");

  const filteredSales = useMemo(() => {
    if (range === "all") return sales;
    const tk = todayKey();
    return sales.filter((s) => todayKey(new Date(s.ts)) === tk);
  }, [sales, range]);

  const totals = useMemo(() => {
    let revenue = 0, profit = 0, lineCount = 0;
    for (const s of filteredSales) {
      for (const it of s.items) {
        revenue += it.qty * it.price;
        profit += it.qty * (it.price - (it.cost || 0));
        lineCount += 1;
      }
    }
    return { revenue, profit, lineCount, count: filteredSales.length };
  }, [filteredSales]);

  const stockPc = products.filter((p) => (p.unit || "pc") === "pc").reduce((a, p) => a + p.stock, 0);
  const stockKg = products.filter((p) => p.unit === "kg").reduce((a, p) => a + p.stock, 0);
  const sortedSales = [...filteredSales].sort((a, b) => b.ts - a.ts);

  return (
    <div className="px-4 pt-3">
      <div className="flex gap-2 mb-4">
        {[{ id: "today", label: "Today" }, { id: "all", label: "All time" }].map((r) => (
          <button
            key={r.id}
            onClick={() => setRange(r.id)}
            className={`text-xs font-semibold px-3 py-1.5 rounded-full border transition-colors ${
              range === r.id ? "bg-amber-400 text-stone-950 border-amber-400" : "bg-stone-900 text-stone-400 border-stone-800"
            }`}
          >
            {r.label}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 gap-2.5 mb-4">
        <StatCard label="Sales" value={totals.count} />
        <StatCard label="Products sold" value={totals.lineCount} />
        <StatCard label="Revenue" value={money(totals.revenue)} accent />
        <StatCard label="Profit" value={money(totals.profit)} accent />
      </div>

      <div className="bg-stone-900 border border-stone-800 rounded-xl px-3.5 py-3 mb-5 space-y-1.5">
        <div className="flex items-center justify-between">
          <span className="text-sm text-stone-400">Remaining stock — pieces</span>
          <span className="font-bold">{stockPc} pc</span>
        </div>
        <div className="flex items-center justify-between">
          <span className="text-sm text-stone-400">Remaining stock — by weight</span>
          <span className="font-bold">{Math.round(stockKg * 100) / 100} kg</span>
        </div>
      </div>

      <h3 className="text-sm font-semibold text-stone-400 mb-2">{range === "today" ? "Today's sales" : "All sales"}</h3>
      {sortedSales.length === 0 ? (
        <EmptyState icon="receipt" title="No sales yet" body="Completed sales will show up here." />
      ) : (
        <div className="space-y-2">
          {sortedSales.map((s) => (
            <SaleRow key={s.id} sale={s} />
          ))}
        </div>
      )}
    </div>
  );
}

function SaleRow({ sale }) {
  const [open, setOpen] = useState(false);
  const time = new Date(sale.ts).toLocaleString(undefined, {
    month: "short", day: "numeric", hour: "numeric", minute: "2-digit",
  });
  const lineCount = sale.items.length;
  return (
    <div className="bg-stone-900 border border-stone-800 rounded-xl overflow-hidden">
      <button onClick={() => setOpen((v) => !v)} className="w-full flex items-center justify-between px-3.5 py-3">
        <div className="text-left">
          <div className="text-sm font-medium">{time}</div>
          <div className="text-xs text-stone-500">{lineCount} product{lineCount === 1 ? "" : "s"}</div>
        </div>
        <div className="font-bold text-amber-400">{money(sale.total)}</div>
      </button>
      {open && (
        <div className="px-3.5 pb-3 pt-0 border-t border-stone-800/70">
          {sale.items.map((it, i) => (
            <div key={i} className="flex items-center justify-between text-xs py-1.5 text-stone-400">
              <span>{fmtQty(it.qty, it.unit)} {unitLabel(it.unit)} × {it.name}</span>
              <span>{money(it.qty * it.price)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function StatCard({ label, value, accent }) {
  return (
    <div className="bg-stone-900 border border-stone-800 rounded-xl p-3.5">
      <div className="text-xs text-stone-500 mb-1">{label}</div>
      <div className={`text-xl font-bold ${accent ? "text-amber-400" : "text-stone-100"}`}>{value}</div>
    </div>
  );
}

function EmptyState({ icon, title, body }) {
  return (
    <div className="flex flex-col items-center justify-center text-center py-16 px-6">
      <div className="w-12 h-12 rounded-full bg-stone-900 border border-stone-800 flex items-center justify-center mb-3">
        <Icon name={icon} size={20} className="text-stone-600" />
      </div>
      <div className="font-semibold text-sm mb-1">{title}</div>
      <div className="text-xs text-stone-500">{body}</div>
    </div>
  );
}

// ---------------- MOUNT ----------------
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// ---------------- PWA: register service worker ----------------
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch((e) => console.warn("SW registration failed", e));
  });
}
</script>
</body>
